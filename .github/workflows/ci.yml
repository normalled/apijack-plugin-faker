# Build step (`bun run build`) is omitted during local-dev against file:../apijack.
# Re-enable once @apijack/core is published and the devDep is flipped to ^1.9.0.
name: CI
on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun test
